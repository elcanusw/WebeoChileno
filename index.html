<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebeoChileno</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;500&display=swap');

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;
}

/* FONDO */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
  url('https://i.ibb.co/4ny4T5Qg/1774621658204-2.jpg');
  background-size:cover;
  background-position:center;
  z-index:-1;
  animation:zoom 20s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.15);}
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,0.9);
  padding:10px 0;
  z-index:999;
  border-bottom:2px solid #00ff88;
}

.navbar button{
  background:none;
  border:none;
  color:#aaa;
  font-weight:bold;
  cursor:pointer;
}

.navbar button:hover{
  color:#00ff88;
}

/* PANTALLAS */
.screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding-top:70px;
}

.hidden{display:none;}

.logo{
  font-size:80px;
  font-family:'Montserrat';
  margin-bottom:30px;
  background:linear-gradient(90deg,#00ff88,#00ccff,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card{
  background:rgba(0,0,0,0.6);
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  text-align:center;
  backdrop-filter:blur(10px);
}

button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{ transform:scale(1.05); }

.start-btn{
  background:linear-gradient(90deg,#00ff88,#00ccff);
  color:black;
  font-weight:bold;
}

.ttt-cell{
  background:rgba(255,255,255,0.1);
  font-size:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  cursor:pointer;
  aspect-ratio:1/1;
}
</style>
</head>

<body>

<nav class="navbar">
  <button onclick="irInicio()">INICIO</button>
  <button onclick="irJuegos()">JUEGOS</button>
  <button onclick="irEncuestas()">ENCUESTAS</button>
  <button onclick="irContacto()">CONTACTO</button>
  <button onclick="irAportar()">APORTAR</button>
</nav>

<!-- MENU -->
<div class="screen" id="menu">
  <div class="logo">CANU</div>
  <button class="start-btn" onclick="irRunner()">🏃 Runner</button>
  <button class="start-btn" onclick="irBreakout()">🧱 Breakout</button>
  <button class="start-btn" onclick="irAim()">🎯 Aim Trainer</button>
  <button class="start-btn" onclick="irReflex()">⚡ Reflex</button>
  <button class="start-btn" onclick="iniciar()">🧠 Quiz</button>
  <button class="start-btn" onclick="irRPS()">⚔️ Cachipum</button>
  <button class="start-btn" onclick="irPalabra()">🔤 Palabra</button>
  <button class="start-btn" onclick="irTresEnRaya()">❌⭕ Tres en Raya</button>
</div>

<!-- CONTACTO -->
<div class="screen hidden" id="contacto">
  <div class="card">
    <h2>📩 Contáctanos</h2>
    <input placeholder="Nombre">
    <input placeholder="Correo">
    <textarea placeholder="Mensaje"></textarea>
    <button class="start-btn">Enviar</button>
  </div>
</div>

<!-- APORTAR -->
<div class="screen hidden" id="aportar">
  <div class="card">
    <h2>💰 Apoyar</h2>
    <p>Apoya el proyecto 🚀</p>
    <button class="start-btn">Donar</button>
  </div>
</div>

<!-- ================= JUEGOS ================= -->

<!-- RUNNER -->
<div class="screen hidden" id="runner">
  <div class="card">
    <h2>🏃 Endless Runner</h2>
    <p id="runnerScore">Puntaje: 0</p>
    <canvas id="runnerCanvas" width="400" height="400"></canvas>
    <button class="start-btn" onclick="reiniciarRunner()">🔄 Reiniciar</button>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- BREAKOUT -->
<div class="screen hidden" id="breakout">
  <div class="card">
    <h2>🧱 Breakout</h2>
    <p id="breakScore">Puntaje: 0</p>
    <canvas id="breakCanvas" width="400" height="400"></canvas>
    <button class="start-btn" onclick="reiniciarBreak()">🔄 Reiniciar</button>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- AIM -->
<div class="screen hidden" id="aim">
  <div class="card" style="position:relative;height:500px;">
    <h2>🎯 Aim Trainer</h2>
    <p id="aimStats"></p>
    <div id="aimTarget" style="position:absolute;width:70px;height:70px;border-radius:50%;background:#ff00cc;display:none;"></div>
    <button class="start-btn" onclick="iniciarAim()">▶️ Empezar</button>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- REFLEX -->
<div class="screen hidden" id="reflex">
  <div class="card" style="position:relative;height:500px;">
    <h2>⚡ Reflex</h2>
    <p id="reflexScore"></p>
    <button id="reflexBtn" style="position:absolute;width:80px;height:80px;border-radius:50%;display:none;">🔥</button>
    <button class="start-btn" onclick="iniciarReflex()">▶️ Empezar</button>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- QUIZ -->
<div class="screen hidden" id="quiz">
  <div class="card" id="quizBox"></div>
</div>

<div class="screen hidden" id="resultado">
  <div class="card">
    <h2 id="final"></h2>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- RPS -->
<div class="screen hidden" id="rps">
  <div class="card">
    <h2>Cachipum</h2>
    <p id="rpsResult"></p>
    <button onclick="jugar('piedra')">Piedra</button>
    <button onclick="jugar('papel')">Papel</button>
    <button onclick="jugar('tijera')">Tijera</button>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- PALABRA -->
<div class="screen hidden" id="palabra">
  <div class="card">
    <h2>Palabra</h2>
    <button onclick="modoAhorcado()">Iniciar</button>
    <p id="palabraTexto"></p>
    <input id="letra">
    <button onclick="intentarLetra()">Intentar</button>
    <p id="estadoA"></p>
    <button onclick="volver()">Volver</button>
  </div>
</div>

<!-- TRES EN RAYA -->
<div class="screen hidden" id="tresEnRaya">
  <div class="card">
    <h2>Tres en Raya</h2>
    <p id="tttResult"></p>
    <div id="board" style="display:grid;grid-template-columns:repeat(3,80px);gap:8px;">
      <div class="ttt-cell" data-index="0" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="1" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="2" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="3" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="4" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="5" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="6" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="7" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="8" onclick="hacerMovimiento(this)"></div>
    </div>
    <button onclick="reiniciarTTT()">Reiniciar</button>
    <button onclick="volver()">Volver</button>
  </div>
</div>

<script>
/* NAV */
function ocultarTodo(){
  document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
}
function irInicio(){ ocultarTodo(); menu.classList.remove("hidden"); }
function irJuegos(){ irInicio(); }
function irEncuestas(){ ocultarTodo(); quiz.classList.remove("hidden"); }
function irContacto(){ ocultarTodo(); contacto.classList.remove("hidden"); }
function irAportar(){ ocultarTodo(); aportar.classList.remove("hidden"); }
function cambiar(a,b){ document.getElementById(a).classList.add("hidden"); document.getElementById(b).classList.remove("hidden"); }
function volver(){ irInicio(); }

// ====================== RUNNER ======================
let rCanvas, rCtx, player, gravity, obstacles, rScore, rSpeed, runnerInterval, isJumping=false;

function irRunner(){ cambiar("menu","runner"); iniciarRunner(); }

function iniciarRunner(){
  rCanvas = document.getElementById("runnerCanvas");
  rCtx = rCanvas.getContext("2d");

  player = {x:50, y:300, w:20, h:20, vy:0};
  gravity = 0.8;
  obstacles = [];
  rScore = 0;
  rSpeed = 4;

  document.getElementById("runnerScore").innerText = "Puntaje: 0";

  clearInterval(runnerInterval);
  runnerInterval = setInterval(loopRunner, 16);
}

function loopRunner(){ updateRunner(); drawRunner(); }

function updateRunner(){
  player.vy += gravity;
  player.y += player.vy;

  if(player.y > 300){
    player.y = 300;
    player.vy = 0;
    isJumping = false;
  }

  if(Math.random() < 0.02){
    obstacles.push({x:400, y:300, w:20, h:20});
  }

  obstacles.forEach(o => o.x -= rSpeed);

  obstacles.forEach(o => {
    if(player.x < o.x + o.w &&
       player.x + player.w > o.x &&
       player.y < o.y + o.h &&
       player.y + player.h > o.y){
      clearInterval(runnerInterval);
      alert("GAME OVER");
    }
  });

  obstacles = obstacles.filter(o => o.x > -20);

  rScore++;
  document.getElementById("runnerScore").innerText = "Puntaje: " + rScore;
}

function drawRunner(){
  rCtx.fillStyle="#111"; rCtx.fillRect(0,0,400,400);
  rCtx.fillStyle="#00ff88"; rCtx.fillRect(player.x,player.y,20,20);
  rCtx.fillStyle="#ff00cc"; obstacles.forEach(o=>rCtx.fillRect(o.x,o.y,o.w,o.h));
}

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp" && !document.getElementById("runner").classList.contains("hidden")){
    if(!isJumping){ player.vy=-12; isJumping=true; }
  }
});

// ====================== BREAKOUT ======================
let breakCanvas, breakCtx, ballX, ballY, ballDX, ballDY, paddleX, breakInterval;

function irBreakout(){ cambiar("menu","breakout"); iniciarBreak(); }

function iniciarBreak(){
  breakCanvas = document.getElementById("breakCanvas");
  breakCtx = breakCanvas.getContext("2d");

  ballX=200; ballY=300; ballDX=3; ballDY=-3; paddleX=150;

  clearInterval(breakInterval);
  breakInterval = setInterval(loopBreak,16);
}

function loopBreak(){
  breakCtx.fillStyle="#111"; breakCtx.fillRect(0,0,400,400);

  ballX+=ballDX; ballY+=ballDY;

  if(ballX<0||ballX>400) ballDX*=-1;
  if(ballY<0) ballDY*=-1;

  if(ballY>400){ clearInterval(breakInterval); alert("Perdiste"); }

  breakCtx.beginPath();
  breakCtx.arc(ballX,ballY,8,0,Math.PI*2);
  breakCtx.fill();

  breakCtx.fillRect(paddleX,370,80,10);
}

// ====================== AIM ======================
function irAim(){ cambiar("menu","aim"); }

// ====================== REFLEX ======================
function irReflex(){ cambiar("menu","reflex"); }

// ====================== QUIZ ======================
function iniciar(){ cambiar("menu","quiz"); }

// ====================== RPS ======================
function irRPS(){ cambiar("menu","rps"); }

// ====================== PALABRA ======================
function irPalabra(){ cambiar("menu","palabra"); }

// ====================== TRES EN RAYA ======================
let board = Array(9).fill(null);

function irTresEnRaya(){ cambiar("menu","tresEnRaya"); }

function hacerMovimiento(cell){
  let i = cell.dataset.index;
  if(board[i]) return;
  board[i] = "X";
  cell.innerText = "X";
}

function reiniciarTTT(){
  board = Array(9).fill(null);
  document.querySelectorAll(".ttt-cell").forEach(c=>c.innerText="");
}
  // ====================== QUIZ ======================
const preguntas = [
  {texto:"¿Dónde nací?", opciones:["Valparaíso, Chile","Trondheim, Noruega","Noje"], correcta:1},
  {texto:"Llegando a Chile... ¿A qué cerro llegué?", opciones:["Barón","Lecheros","Cárcel"], correcta:1},
  {texto:"¿Cuántos hijos tengo actualmente (2026)?", opciones:["4","2","3"], correcta:2}
];

let iQuiz = 0;
let puntosQuiz = 0;

function iniciar(){
  iQuiz = 0;
  puntosQuiz = 0;
  cambiar("menu","quiz");
  mostrarQuiz();
}

function mostrarQuiz(){
  let p = preguntas[iQuiz];

  quizBox.innerHTML = `
    <h2>${p.texto}</h2>
    ${p.opciones.map((op, i) => 
      `<button onclick="responder(${i === p.correcta})">${op}</button>`
    ).join("")}
  `;
}

function responder(correcta){
  if(correcta) puntosQuiz++;

  if(iQuiz < preguntas.length - 1){
    iQuiz++;
    mostrarQuiz();
  }else{
    finQuiz();
  }
}

function finQuiz(){
  cambiar("quiz","resultado");
  final.innerText = `Puntaje: ${puntosQuiz}/${preguntas.length}`;
}
</script>

</body>
</html>
