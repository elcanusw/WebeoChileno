<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Familia Canu</title>
    <style>
        /* CSS INTEGRADO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            /* Usamos tu imagen de fondo */
            background: url('1000309575.jpg') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .quiz-container {
            width: 90%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.7); /* Fondo oscuro transparente para que resalte */
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: white;
            font-size: 1.4rem;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: #ffffff;
            color: #1a1a1a;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:active {
            transform: scale(0.95);
            background: #28a745; /* Verde al clickear */
            color: white;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h1 id="pregunta">Cargando...</h1>
        <div id="opciones" class="options-grid">
            </div>
    </div>

    <script>
        // LÓGICA JAVASCRIPT
        const preguntas = [
            {
                p: "¿Dónde nació Christian?",
                o: ["Trondheim", "Viña del Mar"],
                c: "Trondheim"
            },
            {
                p: "¿Cuál es su club de fútbol?",
                o: ["Everton", "Wanderers"],
                c: "Wanderers"
            },
            {
                p: "¿Cómo se llama su marca?",
                o: ["eLcAnu", "Diseño Valpo"],
                c: "eLcAnu"
            },
            {
                p: "¿Cómo se llamaba su hermano?",
                o: ["Luis Acuña", "ShikoLalo"],
                c: "ShikoLalo"
            }
        ];

        let indice = 0;

        function mostrarPregunta() {
            const titulo = document.getElementById('pregunta');
            const botones = document.getElementById('opciones');
            
            titulo.innerText = preguntas[indice].p;
            botones.innerHTML = "";

            preguntas[indice].o.forEach(opcion => {
                const b = document.createElement('button');
                b.innerText = opcion;
                b.classList.add('btn');
                b.onclick = () => validar(opcion);
                botones.appendChild(b);
            });
        }

        function validar(respuesta) {
            if (respuesta === preguntas[indice].c) {
                alert("¡Eso es! Correcto.");
            } else {
                alert("Mala suerte, intenta de nuevo.");
            }

            indice++;
            if (indice < preguntas.length) {
                mostrarPregunta();
            } else {
                document.getElementById('pregunta').innerText = "¡Terminaste el Quiz, Canu!";
                document.getElementById('opciones').innerHTML = '<button class="btn" onclick="location.reload()">Jugar de nuevo</button>';
            }
        }

        // Iniciar
        window.onload = mostrarPregunta;
    </script>
</body>
</html>
