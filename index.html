<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebeoChileno</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;500&display=swap');

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;
}

/* FONDO */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
  url('https://i.ibb.co/4ny4T5Qg/1774621658204-2.jpg');
  background-size:cover;
  background-position:center;
  z-index:-1;
  animation:zoom 20s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.15);}
}

/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:rgba(0,0,0,0.9);
  padding:10px 0;
  z-index:999;
  border-bottom:2px solid #00ff88;
}

.navbar button{
  background:none;
  border:none;
  color:#aaa;
  font-weight:bold;
  cursor:pointer;
}

.navbar button:hover{
  color:#00ff88;
}

/* PANTALLAS */
.screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding-top:70px;
}

.hidden{display:none;}

.logo{
  font-size:80px;
  font-family:'Montserrat';
  margin-bottom:30px;
  background:linear-gradient(90deg,#00ff88,#00ccff,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card{
  background:rgba(0,0,0,0.6);
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  text-align:center;
  backdrop-filter:blur(10px);
}

button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{ transform:scale(1.05); }

.start-btn{
  background:linear-gradient(90deg,#00ff88,#00ccff);
  color:black;
  font-weight:bold;
}

.ttt-cell{
  background:rgba(255,255,255,0.1);
  font-size:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  cursor:pointer;
  aspect-ratio:1/1;
}
</style>
</head>

<body>

<nav class="navbar">
  <button onclick="irInicio()">INICIO</button>
  <button onclick="irJuegos()">JUEGOS</button>
  <button onclick="irEncuestas()">ENCUESTAS</button>
  <button onclick="irContacto()">CONTACTO</button>
  <button onclick="irAportar()">APORTAR</button>
</nav>

<div class="screen" id="menu">
  <div class="logo">CANU</div>
  <button class="start-btn" onclick="irRunner()">🏃 Runner</button>
  <button class="start-btn" onclick="irBreakout()">🧱 Breakout</button>
  <button class="start-btn" onclick="irAim()">🎯 Aim Trainer (Próximamente)</button>
  <button class="start-btn" onclick="irReflex()">⚡ Reflex (Próximamente)</button>
  <button class="start-btn" onclick="iniciar()">🧠 Quiz</button>
  <button class="start-btn" onclick="irRPS()">⚔️ Cachipum</button>
  <button class="start-btn" onclick="irPalabra()">🔤 Palabra</button>
  <button class="start-btn" onclick="irTresEnRaya()">❌⭕ Tres en Raya</button>
</div>

<div class="screen hidden" id="contacto">
  <div class="card">
    <h2>📩 Contáctanos</h2>
    <input placeholder="Nombre" style="width:90%; padding:8px; margin:5px;">
    <input placeholder="Correo" style="width:90%; padding:8px; margin:5px;">
    <textarea placeholder="Mensaje" style="width:90%; padding:8px; margin:5px;"></textarea>
    <button class="start-btn">Enviar</button>
  </div>
</div>

<div class="screen hidden" id="aportar">
  <div class="card">
    <h2>💰 Apoyar</h2>
    <p>Apoya el proyecto 🚀</p>
    <button class="start-btn">Donar</button>
  </div>
</div>

<div class="screen hidden" id="runner">
  <div class="card">
    <h2>🏃 Endless Runner</h2>
    <p id="runnerScore">Puntaje: 0</p>
    <canvas id="runnerCanvas" width="400" height="400" style="max-width:100%;"></canvas>
    <button class="start-btn" onclick="reiniciarRunner()">🔄 Reiniciar</button>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<div class="screen hidden" id="breakout">
  <div class="card">
    <h2>🧱 Breakout</h2>
    <p id="breakScore">Puntaje: 0</p>
    <canvas id="breakCanvas" width="400" height="400" style="max-width:100%;"></canvas>
    <button class="start-btn" onclick="reiniciarBreak()">🔄 Reiniciar</button>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<div class="screen hidden" id="quiz">
  <div class="card" id="quizBox"></div>
</div>

<div class="screen hidden" id="resultado">
  <div class="card">
    <h2 id="final"></h2>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<div class="screen hidden" id="rps">
  <div class="card">
    <h2>Cachipum</h2>
    <p id="rpsResult"></p>
    <button onclick="jugar('piedra')">Piedra</button>
    <button onclick="jugar('papel')">Papel</button>
    <button onclick="jugar('tijera')">Tijera</button>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<div class="screen hidden" id="palabra">
  <div class="card">
    <h2>Palabra</h2>
    <button onclick="modoAhorcado()">Iniciar</button>
    <p id="palabraTexto"></p>
    <input id="letra" maxlength="1" style="width:40px; text-align:center; padding:10px;">
    <button onclick="intentarLetra()">Intentar</button>
    <p id="estadoA"></p>
    <button onclick="volver()">Volver</button>
  </div>
</div>

<div class="screen hidden" id="tresEnRaya">
  <div class="card">
    <h2>Tres en Raya</h2>
    <p id="tttResult"></p>
    <div id="board" style="display:grid;grid-template-columns:repeat(3,80px);gap:8px; justify-content:center;">
      <div class="ttt-cell" data-index="0" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="1" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="2" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="3" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="4" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="5" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="6" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="7" onclick="hacerMovimiento(this)"></div>
      <div class="ttt-cell" data-index="8" onclick="hacerMovimiento(this)"></div>
    </div>
    <button onclick="reiniciarTTT()" style="margin-top:10px;">Reiniciar</button>
    <button onclick="volver()">Volver</button>
  </div>
</div>

<script>
/* ELEMENTOS DOM */
const quizBox = document.getElementById("quizBox");
const final = document.getElementById("final");
const rpsResult = document.getElementById("rpsResult");
const palabraTexto = document.getElementById("palabraTexto");
const estadoA = document.getElementById("estadoA");
const letraInput = document.getElementById("letra");
const tttResult = document.getElementById("tttResult");

/* ====================== RUNNER ====================== */
let rCanvas, rCtx;
let player, gravity, obstacles, rScore, rSpeed;
let runnerInterval;
let isJumping = false;

function irRunner(){
  cambiar("menu","runner");
  iniciarRunner();
}

function iniciarRunner(){
  rCanvas = document.getElementById("runnerCanvas");
  rCtx = rCanvas.getContext("2d");
  player = {x:50, y:300, w:20, h:20, vy:0};
  gravity = 0.8;
  obstacles = [];
  rScore = 0;
  rSpeed = 4;
  document.getElementById("runnerScore").innerText = "Puntaje: 0";
  if(runnerInterval) clearInterval(runnerInterval);
  runnerInterval = setInterval(loopRunner, 16);
}

function loopRunner(){
  updateRunner();
  drawRunner();
}

function updateRunner(){
  player.vy += gravity;
  player.y += player.vy;
  if(player.y > 300){
    player.y = 300;
    player.vy = 0;
    isJumping = false;
  }
  if(Math.random() < 0.02){
    obstacles.push({x:400,y:300,w:20,h:20});
  }
  obstacles.forEach(o => o.x -= rSpeed);
  obstacles.forEach(o => {
    if(player.x < o.x + o.w && player.x + player.w > o.x && player.y < o.y + o.h && player.y + player.h > o.y){
      clearInterval(runnerInterval);
      alert("💀 GAME OVER\nPuntaje: " + rScore);
      reiniciarRunner();
    }
  });
  obstacles = obstacles.filter(o => o.x > -20);
  rScore++;
  document.getElementById("runnerScore").innerText = "Puntaje: " + rScore;
  if(rScore % 500 === 0) rSpeed += 0.5;
}

function drawRunner(){
  rCtx.fillStyle = "#111";
  rCtx.fillRect(0,0,400,400);
  rCtx.fillStyle = "#333";
  rCtx.fillRect(0,320,400,5);
  rCtx.fillStyle = "#00ff88";
  rCtx.fillRect(player.x,player.y,player.w,player.h);
  rCtx.fillStyle = "#ff00cc";
  obstacles.forEach(o => rCtx.fillRect(o.x,o.y,o.w,o.h));
}

function saltar(){
  if(!isJumping){
    player.vy = -12;
    isJumping = true;
  }
}

document.addEventListener("keydown", e=>{
  if(!document.getElementById("runner").classList.contains("hidden") && (e.key==="ArrowUp" || e.key===" ")){
    saltar();
  }
});

function reiniciarRunner(){ iniciarRunner(); }

/* ====================== BREAKOUT ====================== */
let breakCanvas, breakCtx;
let ballX, ballY, ballDX, ballDY;
let paddleX;
let rightPressed=false, leftPressed=false;
let bricks=[], rows=5, cols=7;
let brickW=50, brickH=15;
let scoreBreak=0, breakInterval;

function irBreakout(){ cambiar("menu","breakout"); iniciarBreak(); }

function iniciarBreak(){
  breakCanvas = document.getElementById("breakCanvas");
  breakCtx = breakCanvas.getContext("2d");
  ballX=200; ballY=300; ballDX=3; ballDY=-3;
  paddleX=150; scoreBreak=0;
  document.getElementById("breakScore").innerText="Puntaje: 0";
  bricks=[];
  for(let r=0;r<rows;r++){
    bricks[r]=[];
    for(let c=0;c<cols;c++){
      bricks[r][c]={x:c*(brickW+5)+20,y:r*(brickH+5)+30,alive:true};
    }
  }
  if(breakInterval) clearInterval(breakInterval);
  breakInterval=setInterval(loopBreak,16);
}

function loopBreak(){ drawBreak(); updateBreak(); }

function drawBreak(){
  breakCtx.fillStyle="#111";
  breakCtx.fillRect(0,0,400,400);
  breakCtx.fillStyle="#00ff88";
  breakCtx.beginPath();
  breakCtx.arc(ballX,ballY,8,0,Math.PI*2);
  breakCtx.fill();
  breakCtx.fillRect(paddleX,370,80,10);
  breakCtx.fillStyle="#ff00cc";
  bricks.forEach(row=>{
    row.forEach(b=>{
      if(b.alive) breakCtx.fillRect(b.x,b.y,brickW,brickH);
    });
  });
}

function updateBreak(){
  ballX+=ballDX; ballY+=ballDY;
  if(ballX<8||ballX>392) ballDX*=-1;
  if(ballY<8) ballDY*=-1;
  if(ballY>400){ clearInterval(breakInterval); alert("💀 Perdiste"); reiniciarBreak(); }
  if(ballY>360 && ballX>paddleX && ballX<paddleX+80) ballDY*=-1;
  bricks.forEach(row=>{
    row.forEach(b=>{
      if(b.alive && ballX>b.x && ballX<b.x+brickW && ballY>b.y && ballY<b.y+brickH){
        ballDY*=-1; b.alive=false; scoreBreak++;
        document.getElementById("breakScore").innerText="Puntaje: "+scoreBreak;
      }
    });
  });
  if(scoreBreak===rows*cols){ clearInterval(breakInterval); alert("🔥 GANASTE 🔥"); reiniciarBreak(); }
  if(rightPressed && paddleX<320) paddleX+=6;
  if(leftPressed && paddleX>0) paddleX-=6;
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") rightPressed=true;
  if(e.key==="ArrowLeft") leftPressed=true;
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowRight") rightPressed=false;
  if(e.key==="ArrowLeft") leftPressed=false;
});

function reiniciarBreak(){ iniciarBreak(); }

/* ====================== QUIZ ====================== */
const preguntas=[
  {texto:"¿Donde nací?",opciones:["Valparaíso, Chile","Trondheim, Noruega","Noje"],correcta:1},
  {texto:"Llegando a Chile... ¿A que cerro llegué?",opciones:["Barón","Lecheros","Cárcel"],correcta:1},
  {texto:"¿Cuantos hijos tengo actualmente (2026)?",opciones:["4","2","3"],correcta:2}
];

let iQuiz=0,puntosQuiz=0;

function iniciar(){
  iQuiz=0;puntosQuiz=0;
  cambiar("menu","quiz");
  mostrarQuiz();
}

function mostrarQuiz(){
  let p=preguntas[iQuiz];
  quizBox.innerHTML=`<h2>${p.texto}</h2>
  ${p.opciones.map((op,i)=>`<button onclick="responder(${i===p.correcta})">${op}</button>`).join("")}`;
}

function responder(ok){
  if(ok) puntosQuiz++;
  if(iQuiz < preguntas.length - 1){
    iQuiz++;
    mostrarQuiz();
  } else {
    finQuiz();
  }
}

function finQuiz(){
  cambiar("quiz","resultado");
  final.innerText=`Puntaje: ${puntosQuiz}/${preguntas.length}`;
}

/* ====================== RPS ====================== */
function irRPS(){ cambiar("menu","rps"); rpsResult.innerText = "¡Elige tu arma!";}

function jugar(p){
  let ops=["piedra","papel","tijera"];
  let cpu=ops[Math.floor(Math.random()*3)];
  let res="Empate";
  if(p!==cpu){
    if((p==="piedra"&&cpu==="tijera")||(p==="papel"&&cpu==="piedra")||(p==="tijera"&&cpu==="papel")) res="Ganaste 😎";
    else res="Perdiste 💀";
  }
  rpsResult.innerText=`${p} vs ${cpu} → ${res}`;
}

/* ====================== PALABRA ====================== */
const palabras=["gato","perro","casa","codigo","juego"];
let palabraSecreta="",progreso=[],intentos;

function irPalabra(){ cambiar("menu","palabra"); }

function modoAhorcado(){
  palabraSecreta=palabras[Math.floor(Math.random()*palabras.length)];
  progreso=Array(palabraSecreta.length).fill("_");
  intentos=6; actualizarPalabra();
}

function actualizarPalabra(){
  palabraTexto.innerText=progreso.join(" ");
  estadoA.innerText="Intentos: "+intentos;
}

function intentarLetra(){
  let l=letraInput.value.toLowerCase(); letraInput.value="";
  if(!l) return;
  let ok=false;
  for(let i=0;i<palabraSecreta.length;i++){
    if(palabraSecreta[i]===l){ progreso[i]=l; ok=true; }
  }
  if(!ok) intentos--;
  actualizarPalabra();
  setTimeout(()=>{
      if(!progreso.includes("_")){ alert("Ganaste 🔥"); modoAhorcado(); }
      else if(intentos<=0){ alert("Perdiste 😭 → "+palabraSecreta); modoAhorcado(); }
  },50);
}

/* ====================== TRES EN RAYA ====================== */
let board=Array(9).fill(null),gameOver=false;

function irTresEnRaya(){ cambiar("menu","tresEnRaya"); reiniciarTTT(); }

function reiniciarTTT(){
  board=Array(9).fill(null); gameOver=false;
  tttResult.innerText = "";
  document.querySelectorAll(".ttt-cell").forEach(c=>c.textContent="");
}

function hacerMovimiento(cell){
  if(gameOver) return;
  let i=cell.dataset.index;
  if(board[i]) return;
  board[i]="❌"; cell.textContent="❌";
  if(checkWin("❌")){ tttResult.innerText="GANASTE"; gameOver=true; return; }
  let empty=board.map((v,i)=>v?null:i).filter(v=>v!==null);
  if(empty.length===0){ tttResult.innerText="Empate"; gameOver=true; return; }
  let r=empty[Math.floor(Math.random()*empty.length)];
  board[r]="⭕";
  document.querySelectorAll(".ttt-cell")[r].textContent="⭕";
  if(checkWin("⭕")){ tttResult.innerText="CPU ganó"; gameOver=true; }
}

function checkWin(p){
  const w=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  return w.some(c=>c.every(i=>board[i]===p));
}

/* ================= NAV ================= */
function ocultarTodo(){
  document.querySelectorAll(".screen").forEach(s => s.classList.add("hidden"));
  if(runnerInterval) clearInterval(runnerInterval);
  if(breakInterval) clearInterval(breakInterval);
}

function irInicio(){
  ocultarTodo();
  document.getElementById("menu").classList.remove("hidden");
}

function irJuegos(){ irInicio(); }
function irEncuestas(){ ocultarTodo(); document.getElementById("quiz").classList.remove("hidden"); iniciar(); }
function irContacto(){ ocultarTodo(); document.getElementById("contacto").classList.remove("hidden"); }
function irAportar(){ ocultarTodo(); document.getElementById("aportar").classList.remove("hidden"); }

function cambiar(a,b){
  document.getElementById(a).classList.add("hidden");
  document.getElementById(b).classList.remove("hidden");
}

function volver(){ irInicio(); }

/* SOPORTE TOUCH */
window.onload = () => {
    document.getElementById("runnerCanvas").addEventListener("touchstart", (e) => {
        e.preventDefault();
        saltar();
    });
};
</script>

</body>
</html>
