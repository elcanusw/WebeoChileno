<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebeoChileno GOD</title>

<style>
body{margin:0;font-family:sans-serif;background:#000;color:#fff;text-align:center}
nav{display:flex;justify-content:space-around;background:#111;padding:10px}
button{padding:10px;border:none;margin:5px;border-radius:8px;cursor:pointer}
.active{color:#0f0}
.tab{display:none}
.tab.active{display:block}
canvas{background:#111;margin-top:10px}
.screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000}
.screen.active{display:block}
</style>
</head>

<body>

<nav>
<button onclick="tab('inicio')">Inicio</button>
<button onclick="tab('juegos')">Juegos</button>
<button onclick="tab('encuestas')">Encuestas</button>
</nav>

<div id="inicio" class="tab active">
<h2>INICIO</h2>
<p>EDITA ESTE TEXTO A TU GUSTO</p>
<p>Mejor puntaje Runner: <span id="best"></span></p>
</div>

<div id="juegos" class="tab">
<button onclick="irRunner()">Runner</button>
<button onclick="irBreak()">Breakout</button>
<button onclick="irTTT()">Tres en Raya</button>
</div>

<div id="encuestas" class="tab">
<button onclick="quiz()">Quiz</button>
</div>

<!-- RUNNER -->
<div id="runner" class="screen">
<canvas id="r" width="400" height="400"></canvas>
<button onclick="volver()">Volver</button>
</div>

<!-- BREAK -->
<div id="break" class="screen">
<canvas id="b" width="400" height="400"></canvas>
<button onclick="volver()">Volver</button>
</div>

<!-- TTT -->
<div id="ttt" class="screen">
<div id="board"></div>
<button onclick="volver()">Volver</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<div id="qbox"></div>
<button onclick="volver()">Volver</button>
</div>

<script>

// tabs
function tab(id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

// nav
function abrir(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
}
function volver(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
}

// ================= RUNNER =================
let ctx,p,vy,obs,score,loop;
function irRunner(){
abrir('runner')
ctx=r.getContext('2d')
p={x:50,y:300}
vy=0
obs=[]
score=0

loop=setInterval(()=>{
ctx.fillRect(0,0,400,400)

vy+=0.8;p.y+=vy
if(p.y>300){p.y=300;vy=0}

if(Math.random()<0.02)obs.push({x:400})

obs.forEach(o=>o.x-=5)

obs.forEach(o=>{
if(p.x<o.x+20 && p.x+20>o.x && p.y>280){
clearInterval(loop)
let best=localStorage.getItem("best")||0
if(score>best){localStorage.setItem("best",score)}
alert("Game Over: "+score)
location.reload()
}
})

score++

ctx.fillStyle="#0f0"
ctx.fillRect(p.x,p.y,20,20)

ctx.fillStyle="#f0f"
obs.forEach(o=>ctx.fillRect(o.x,300,20,20))

},16)
}

// ================= BREAKOUT =================
let bx,by,dx,dy,px;
function irBreak(){
abrir('break')
let c=b.getContext('2d')
bx=200;by=300;dx=3;dy=-3;px=150

setInterval(()=>{
c.clearRect(0,0,400,400)

bx+=dx;by+=dy

if(bx<0||bx>400)dx*=-1
if(by<0)dy*=-1

if(by>380){
alert("Perdiste")
location.reload()
}

if(by>350 && bx>px && bx<px+80)dy*=-1

c.beginPath()
c.arc(bx,by,8,0,Math.PI*2)
c.fill()

c.fillRect(px,370,80,10)

},16)

document.onmousemove=e=>px=e.clientX-40
}

// ================= QUIZ =================
let preguntas=[
{t:"Capital de Chile",o:["Santiago","Lima"],c:0},
{t:"2+2",o:["3","4"],c:1}
],qi=0,puntos=0;

function quiz(){
abrir('quiz')
qi=0;puntos=0
mostrarQ()
}

function mostrarQ(){
let p=preguntas[qi]
qbox.innerHTML=`<h2>${p.t}</h2>
${p.o.map((o,i)=>`<button onclick="resp(${i})">${o}</button>`).join("")}`
}

function resp(i){
if(i===preguntas[qi].c)puntos++
qi++
if(qi<preguntas.length)mostrarQ()
else alert("Puntaje: "+puntos)
}

// ================= TTT IA =================
let board=Array(9).fill("")
function irTTT(){
abrir('ttt')
render()
}

function render(){
boardHTML=""
board.forEach((v,i)=>{
boardHTML+=`<button onclick="move(${i})">${v}</button>`
})
document.getElementById("board").innerHTML=boardHTML
}

function move(i){
if(board[i])return
board[i]="X"
cpu()
render()
}

function cpu(){
let empty=board.map((v,i)=>v==""?i:null).filter(v=>v!=null)
if(empty.length==0)return
let r=empty[Math.floor(Math.random()*empty.length)]
board[r]="O"
}

// init
document.getElementById("best").innerText=localStorage.getItem("best")||0

</script>

</body>
</html>
