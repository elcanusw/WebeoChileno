<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canu Ultra Loco</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;500&display=swap');

body{
  html, body{
  height:100%;
}
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;
  position:relative;
}

/* 🌌 FONDO */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
  url('https://i.ibb.co/4ny4T5Qg/1774621658204-2.jpg');
  background-size: cover;
  background-position: center;
  z-index:-1;
  animation: distortBg 20s ease-in-out infinite;
}

@keyframes distortBg{
  0%{transform: scale(1);}
  50%{transform: scale(1.1);}
  100%{transform: scale(1);}
}

.screen{
  .screen{
  position:fixed;
  top:0;
  left:0;;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.hidden{display:none;}

.logo{
  font-size:90px;
  font-family:'Montserrat',sans-serif;
  margin-bottom:30px;
  background:linear-gradient(90deg,#00ff88,#00ccff,#ff00cc,#00ff88);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:colorFlow 5s linear infinite;
}

@keyframes colorFlow{
  0%{background-position:0%}
  100%{background-position:300%}
}

.card{
  background:rgba(0,0,0,0.5);
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  text-align:center;
  backdrop-filter:blur(10px);
}

button{
  width:100%;
  margin:10px 0;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.start-btn{
  background:linear-gradient(90deg,#00ff88,#00ccff);
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="screen" id="menu">
  <div class="logo">CANU</div>
  <button class="start-btn" onclick="iniciar()">¿CuantoSabesDelK!!!? 🧠</button>
  <button class="start-btn" onclick="irRPS()">JuegaCachipum ⚔️</button>
  <button class="start-btn" onclick="irPalabra()">Palabra Secreta 🔤</button>
</div>

<!-- QUIZ -->
<div class="screen hidden" id="quiz">
  <div class="card" id="quizBox"></div>
</div>

<!-- RESULTADO -->
<div class="screen hidden" id="resultado">
  <div class="card">
    <h2 id="final"></h2>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- CACHIPUM -->
<div class="screen hidden" id="rps">
  <div class="card">
    <h2>Cachipum</h2>
    <p id="rpsResult">Elige tu jugada</p>
    <button onclick="jugar('piedra')">🪨 Piedra</button>
    <button onclick="jugar('papel')">📄 Papel</button>
    <button onclick="jugar('tijera')">✂️ Tijera</button>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- PALABRA SECRETA -->
<div class="screen hidden" id="palabra">
  <div class="card">
    <h2>Palabra Secreta</h2>

    <button class="start-btn" onclick="modoAhorcado()">Modo Ahorcado</button>
    <button class="start-btn" onclick="modoContexto()">Modo Contexto</button>

    <div id="ahorcado">
      <p id="palabraTexto"></p>
      <input id="letra" maxlength="1" placeholder="Letra">
      <button class="start-btn" onclick="intentarLetra()">Probar</button>
      <p id="estadoA"></p>
    </div>

    <div id="contexto" style="display:none;">
      <input id="intento" placeholder="Escribe palabra">
      <button class="start-btn" onclick="intentarPalabra()">Intentar</button>
      <p id="pistas"></p>
    </div>

    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<script>
// QUIZ
const preguntas=[
 {texto:"¿Donde nací?",opciones:["Valparaiso","Noruega","Noje"],correcta:1},
];
let i=0,puntos=0;

function iniciar(){cambiar("menu","quiz");mostrar();}
function mostrar(){
 let p=preguntas[i];
 quizBox.innerHTML=`<h2>${p.texto}</h2>`+
 p.opciones.map((op,idx)=>`<button onclick="responder(${idx===p.correcta})">${op}</button>`).join("");
}
function responder(ok){
 if(ok)puntos++;
 i<preguntas.length-1?(i++,mostrar()):fin();
}
function fin(){cambiar("quiz","resultado");final.innerText="Resultado "+puntos;}

// CACHIPUM
function jugar(p){
 let ops=["piedra","papel","tijera"];
 let cpu=ops[Math.floor(Math.random()*3)];
 rpsResult.innerText=`${p} vs ${cpu}`;
}
function irRPS(){cambiar("menu","rps");}

// PALABRA
function irPalabra(){cambiar("menu","palabra");}

const palabras=["gato","perro","casa"];
let palabraSecreta="",progreso=[],intentos;

function modoAhorcado(){
 document.getElementById("ahorcado").style.display="block";
 document.getElementById("contexto").style.display="none";
 palabraSecreta=palabras[Math.floor(Math.random()*3)];
 progreso=Array(palabraSecreta.length).fill("_");
 intentos=6;
 actualizar();
}
function actualizar(){
 palabraTexto.innerText=progreso.join(" ");
 estadoA.innerText="Intentos: "+intentos;
}
function intentarLetra(){
 let l=letra.value; letra.value="";
 let ok=false;
 for(let i=0;i<palabraSecreta.length;i++){
  if(palabraSecreta[i]==l){progreso[i]=l;ok=true;}
 }
 if(!ok)intentos--;
 if(intentos<=0){alert("Perdiste");modoAhorcado();}
 if(!progreso.includes("_")){alert("Ganaste");modoAhorcado();}
 actualizar();
}

let palabraC="";
function modoContexto(){
 ahorcado.style.display="none";
 contexto.style.display="block";
 palabraC=palabras[Math.floor(Math.random()*3)];
 pistas.innerText="";
}
function intentarPalabra(){
 let i=intento.value; intento.value="";
 if(i===palabraC){alert("Ganaste");modoContexto();}
 else pistas.innerText+=i+" ❌\n";
}

// NAV
function volver(){
 cambiar("quiz","menu");
 cambiar("resultado","menu");
 cambiar("rps","menu");
 cambiar("palabra","menu");
}
function cambiar(a,b){
 document.getElementById(a).classList.add("hidden");
 document.getElementById(b).classList.remove("hidden");
}
</script>

</body>
</html>
