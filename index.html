<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canu Ultra Loco PRO</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;500&display=swap');

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;
}

/* 🌌 FONDO */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:
  linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
  url('https://i.ibb.co/4ny4T5Qg/1774621658204-2.jpg');
  background-size:cover;
  background-position:center;
  z-index:-1;
  animation:zoom 20s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.15);}
}

.screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.hidden{display:none;}

.logo{
  font-size:80px;
  font-family:'Montserrat';
  margin-bottom:30px;
  background:linear-gradient(90deg,#00ff88,#00ccff,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card{
  background:rgba(0,0,0,0.6);
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  text-align:center;
  backdrop-filter:blur(10px);
}

button{
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{transform:scale(1.05);}

.start-btn{
  background:linear-gradient(90deg,#00ff88,#00ccff);
  color:black;
  font-weight:bold;
}

/* TRES EN RAYA */
.ttt-cell{
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  cursor:pointer;
  aspect-ratio:1/1;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="screen" id="menu">
  <div class="logo">CANU</div>

  <button class="start-btn" onclick="irRunner()">🏃 Runner</button>
  <button class="start-btn" onclick="irBreakout()">🧱 Breakout</button>
  <button class="start-btn" onclick="irAim()">🎯 Aim Trainer</button>
  <button class="start-btn" onclick="irReflex()">⚡ Reflex</button>
  <button class="start-btn" onclick="iniciar()">🧠 Quiz</button>
  <button class="start-btn" onclick="irRPS()">⚔️ Cachipum</button>
  <button class="start-btn" onclick="irPalabra()">🔤 Palabra</button>
  <button class="start-btn" onclick="irTresEnRaya()">❌⭕ Tres en Raya</button>
  <button class="start-btn" onclick="irConnect4()">🔴 4 en Línea</button>
</div>

<!-- 4 EN LÍNEA -->
<div class="screen hidden" id="connect4">
  <div class="card">
    <h2>🔴 4 en Línea PRO</h2>
    <p id="c4status">Tu turno (🔴)</p>

    <div id="c4board" style="
      display:grid;
      grid-template-columns:repeat(7, 45px);
      gap:5px;
      justify-content:center;
      margin:20px auto;
    "></div>

    <button class="start-btn" onclick="resetC4()">🔄 Reiniciar</button>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<script>
/* ===================== 4 EN LÍNEA PRO ===================== */

let c4board = [];
let c4player = "🔴";
let c4gameOver = false;

function irConnect4(){
  cambiar("menu","connect4");
  initC4();
}

function initC4(){
  c4board = Array(6).fill(null).map(()=>Array(7).fill(null));
  c4player = "🔴";
  c4gameOver = false;
  renderC4();
}

function renderC4(){
  let boardDiv = document.getElementById("c4board");
  boardDiv.innerHTML = "";

  for(let r=0;r<6;r++){
    for(let c=0;c<7;c++){
      let cell = document.createElement("div");
      cell.style.width = "45px";
      cell.style.height = "45px";
      cell.style.borderRadius = "50%";
      cell.style.background = "#222";
      cell.style.display = "flex";
      cell.style.alignItems = "center";
      cell.style.justifyContent = "center";
      cell.style.cursor = "pointer";

      if(c4board[r][c]){
        let img = document.createElement("img");
img.src = c4board[r][c] === "🔴" ? "logo.png" : "logo2.png";        img.style.width = "38px";
        img.style.height = "38px";
        img.style.borderRadius = "50%";
        cell.appendChild(img);
      }

      cell.onclick = () => dropC4(c);
      boardDiv.appendChild(cell);
    }
  }
}

function dropC4(col){
  if(c4gameOver) return;

  for(let r=5;r>=0;r--){
    if(!c4board[r][col]){
      c4board[r][col] = c4player;
      break;
    }
  }

  renderC4();

  if(checkC4(c4player)){
    document.getElementById("c4status").innerText = c4player + " ganó 🔥";
    c4gameOver = true;
    return;
  }

  c4player = (c4player === "🔴") ? "🟡" : "🔴";

  if(c4player === "🟡"){
    setTimeout(cpuC4, 350);
  }
}

/* IA PRO */
function cpuC4(){
  if(c4gameOver) return;

  let preferred = [3,2,4,1,5,0,6];

  for(let c of preferred){
    if(!c4board[0][c]){
      dropC4(c);
      return;
    }
  }
}

/* WIN CHECK */
function checkC4(p){
  for(let r=0;r<6;r++){
    for(let c=0;c<7;c++){

      if(c<=3 &&
        p===c4board[r][c] &&
        p===c4board[r][c+1] &&
        p===c4board[r][c+2] &&
        p===c4board[r][c+3]) return true;

      if(r<=2 &&
        p===c4board[r][c] &&
        p===c4board[r+1][c] &&
        p===c4board[r+2][c] &&
        p===c4board[r+3][c]) return true;

      if(r<=2 && c<=3 &&
        p===c4board[r][c] &&
        p===c4board[r+1][c+1] &&
        p===c4board[r+2][c+2] &&
        p===c4board[r+3][c+3]) return true;

      if(r>=3 && c<=3 &&
        p===c4board[r][c] &&
        p===c4board[r-1][c+1] &&
        p===c4board[r-2][c+2] &&
        p===c4board[r-3][c+3]) return true;
    }
  }
  return false;
}

function resetC4(){
  initC4();
}

/* ================= NAV ================= */
function volver(){
  document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
  document.getElementById("menu").classList.remove("hidden");
}

function cambiar(a,b){
  document.getElementById(a).classList.add("hidden");
  document.getElementById(b).classList.remove("hidden");
}
</script>

</body>
</html>
