<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canu</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@300;400;500&display=swap');

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;

  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
  url('images/fondo.jpg');

  background-size:cover;
  background-position:center;
  animation:zoomBg 20s infinite alternate;
}

@keyframes zoomBg{
  from{background-size:100%;}
  to{background-size:110%;}
}

.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.hidden{display:none;}

.logo{
  font-size:70px;
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(90deg,#00ff88,#00ccff,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-bottom:30px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
  text-align:center;
}

button{
  width:100%;
  margin:10px 0;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.start-btn{
  background:linear-gradient(90deg,#00ff88,#00ccff);
  color:black;
  font-weight:bold;
}

.correct{background:#00ff88!important;}
.wrong{background:#ff0033!important;}
</style>
</head>

<body>

<!-- MENU -->
<div class="screen" id="menu">
  <div class="logo">CANU</div>

  <button class="start-btn" onclick="iniciar()">¿Cuánto sabes de mí? 🧠</button>
  <button class="start-btn" onclick="irRPS()">Cachipum 🎮</button>
</div>

<!-- QUIZ -->
<div class="screen hidden" id="quiz">
  <div class="card" id="quizBox"></div>
</div>

<!-- RESULTADO -->
<div class="screen hidden" id="resultado">
  <div class="card">
    <h2 id="final"></h2>
    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<!-- CACHIPUM -->
<div class="screen hidden" id="rps">
  <div class="card">
    <h2>Cachipum</h2>
    <p id="rpsResult">Elige</p>

    <button onclick="jugar('piedra')">🪨 Piedra</button>
    <button onclick="jugar('papel')">📄 Papel</button>
    <button onclick="jugar('tijera')">✂️ Tijera</button>

    <button class="start-btn" onclick="volver()">Volver</button>
  </div>
</div>

<script>
// QUIZ
const preguntas=[
 {texto:"¿Comida favorita?",opciones:["Pizza","Sushi","Completo"],correcta:2},
 {texto:"¿Qué hago más?",opciones:["Dormir","Salir","Jugar"],correcta:1}
];

let i=0,puntos=0;

function iniciar(){
 cambiar("menu","quiz");
 mostrar();
}

function mostrar(){
 let p=preguntas[i];
 let html=`<h2>${p.texto}</h2>`;

 p.opciones.forEach((op,idx)=>{
  html+=`<button onclick="responder(this,${idx===p.correcta})">${op}</button>`;
 });

 quizBox.innerHTML=html;
}

function responder(btn,ok){
 document.querySelectorAll("#quizBox button").forEach(b=>b.disabled=true);

 if(ok){
  btn.classList.add("correct");
  puntos++;
 }else{
  btn.classList.add("wrong");
 }

 setTimeout(()=>{
  i++;
  i<preguntas.length?mostrar():fin();
 },800);
}

function fin(){
 cambiar("quiz","resultado");
 final.innerText=`Resultado: ${puntos}/${preguntas.length}`;
}

// CACHIPUM
function jugar(p){
 let ops=["piedra","papel","tijera"];
 let cpu=ops[Math.floor(Math.random()*3)];

 let r="";
 if(p===cpu) r="Empate 😐";
 else if(
  (p==="piedra"&&cpu==="tijera")||
  (p==="papel"&&cpu==="piedra")||
  (p==="tijera"&&cpu==="papel")
 ) r="Ganaste 🔥";
 else r="Perdiste 💀";

 rpsResult.innerText=`Tú: ${p} | CPU: ${cpu} → ${r}`;
}

// NAV
function irRPS(){cambiar("menu","rps");}

function volver(){
 i=0;puntos=0;
 cambiar("quiz","menu");
 cambiar("resultado","menu");
 cambiar("rps","menu");
}

function cambiar(a,b){
 document.getElementById(a).classList.add("hidden");
 document.getElementById(b).classList.remove("hidden");
}
</script>

</body>
</html>
