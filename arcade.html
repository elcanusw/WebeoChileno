<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>consolaARCADE - WebeoChileno</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');
        
        /* Fuente para el toque de diseño */
        @font-face {
            font-family: 'CloisterBlack';
            src: url('https://db.onlinewebfonts.com/t/1cf6398f82470747198d970335e23652.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 20px;
            background: #000;
            color: #00ff88;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        .terminal-header {
            font-family: 'CloisterBlack', serif;
            font-size: 2.5rem;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
            margin-bottom: 10px;
        }

        .console-box {
            border: 1px solid #333;
            background: rgba(0, 255, 136, 0.05);
            padding: 15px;
            border-radius: 5px;
            text-align: left;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff88;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-arcade {
            background: #000;
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn-arcade:hover {
            background: #00ff88;
            color: #000;
            box-shadow: 0 0 15px #00ff88;
        }

        .status {
            font-size: 12px;
            color: #555;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="terminal-header">consolaARCADE</div>

    <div class="console-box">
        <div>> INICIALIZANDO SISTEMA...</div>
        <div>> CARGANDO REPOSITORIO: WebeoChileno</div>
        <div>> ESTADO: <span style="color: white;">ONLINE</span></div>
        <div>> SELECCIONA UN ARCHIVO PARA EJECUTAR<span class="cursor"></span></div>
    </div>

    <div class="game-grid">
        <a href="#" class="btn-arcade" onclick="alert('Cargando...')">FILE_01.EXE</a>
        <a href="#" class="btn-arcade" onclick="alert('Cargando...')">FILE_02.EXE</a>
        <a href="#" class="btn-arcade" onclick="alert('Cargando...')">MURAL.BAT</a>
        <a href="#" class="btn-arcade" onclick="alert('Cargando...')">BEATS.WAV</a>
    </div>

    <p class="status">v1.0.0 - eLcAnu System</p>

</body>
</html>
